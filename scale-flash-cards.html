<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Mode Tracker</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: #ffffff; 
            padding: 2rem 1rem; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { 
            background: #1e1e1e; 
            padding: 2rem; 
            border-radius: 16px; 
            width: 100%;
            max-width: 600px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        h1 { color: #4ade80; margin-top: 0; font-size: 2.5rem; }
        .round-title { color: #a1a1aa; font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .exercise { font-size: 3rem; font-weight: bold; margin: 2rem 0; color: #60a5fa; line-height: 1.2; }
        .shift-text { font-size: 1.5rem; color: #f87171; display: block; margin-top: 1rem; }
        .progress { color: #71717a; margin-bottom: 2rem; font-size: 1.1rem; }
        button { 
            background: #4ade80; 
            color: #121212; 
            border: none; 
            padding: 1.2rem 2.5rem; 
            font-size: 1.5rem; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: transform 0.1s, background 0.2s; 
            width: 100%;
            margin-bottom: 1rem;
        }
        button:active { transform: scale(0.97); }
        button:hover { background: #22c55e; }
        button.secondary { background: #3f3f46; color: #ffffff; font-size: 1.2rem; padding: 1rem 2rem; }
        button.secondary:hover { background: #52525b; }
        #app-area { display: none; }
        .scale-select { text-align: left; margin: 1.5rem 0 2rem; }
        .scale-select-title { color: #a1a1aa; font-size: 1rem; font-weight: bold; margin-bottom: 0.75rem; text-align: center; }
        .scale-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #2a2a2a;
            padding: 0.9rem 1.1rem;
            border-radius: 10px;
            margin-bottom: 0.6rem;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .scale-option:hover { background: #333333; }
        .scale-option input { width: 1.3rem; height: 1.3rem; accent-color: #4ade80; cursor: pointer; }
        .hint { color: #71717a; font-size: 0.9rem; margin-top: 0.5rem; }
        .scale-type-row { display: flex; gap: 0.6rem; margin-bottom: 1.25rem; }
        .scale-type-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #2a2a2a;
            padding: 0.8rem 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            border: 2px solid transparent;
        }
        .scale-type-option:hover { background: #333333; }
        .scale-type-option input { position: absolute; opacity: 0; pointer-events: none; }
        .scale-type-option.selected { border-color: #4ade80; color: #4ade80; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Start Screen -->
        <div id="start-area">
            <h1>Mode Practice</h1>
            <p style="color: #a1a1aa; margin-bottom: 1rem; font-size: 1.1rem;">
                Round 1: 1 Position<br>
                Round 2: 2 Octaves / 1 Shift<br>
                Round 3: 3 Positions / 2 Shifts
            </p>
            <div class="scale-select">
                <div class="scale-select-title">Scale type</div>
                <div id="scaleTypeOptions" class="scale-type-row"></div>
                <div id="scaleListTitle" class="scale-select-title">Modes to include</div>
                <div id="scaleOptions"></div>
            </div>
            <button onclick="startNewKey()">Generate Random Key</button>
        </div>

        <!-- Practice Screen -->
        <div id="app-area">
            <h1 id="keyDisplay">Key of C</h1>
            <div id="roundDisplay" class="round-title">Round 1</div>
            <div id="exerciseDisplay" class="exercise">Ready</div>
            <div id="progressDisplay" class="progress">0 / 0</div>
            
            <button id="nextBtn" onclick="nextExercise()">Next Shape</button>
            <div class="hint">Press <strong>Space</strong> for the next card</div>
            <button class="secondary" onclick="startNewKey()">Start Over (New Key)</button>
        </div>
    </div>

    <script>
        const notes = ['A', 'Bb', 'B', 'C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'G#'];

        // The five shapes, shared between the major scale (modes) and the
        // pentatonic positions. Pentatonics relabel these as positions.
        const modeData = [
            { name: 'Ionian', pos: 1 },
            { name: 'Dorian', pos: 2 },
            { name: 'Phrygian', pos: 3 },
            { name: 'Mixolydian', pos: 5 },
            { name: 'Aeolian', pos: 6 }
        ];
        const scaleTypes = ['Major Scale', 'Major Pentatonic', 'Minor Pentatonic'];

        let currentScaleType = 'Major Scale';

        const strings = [1, 2, 3, 4, 5, 6];

        // Label a shape based on the selected scale type: mode name for the
        // major scale, position number for either pentatonic.
        function labelFor(mode) {
            return currentScaleType === 'Major Scale'
                ? mode.name
                : `Position ${mode.pos}`;
        }

        // Build the scale type radio buttons
        function buildScaleTypeOptions() {
            const container = document.getElementById('scaleTypeOptions');
            container.innerHTML = scaleTypes.map(type => `
                <label class="scale-type-option${type === currentScaleType ? ' selected' : ''}">
                    <input type="radio" name="scaleType" value="${type}"${type === currentScaleType ? ' checked' : ''}>
                    <span>${type}</span>
                </label>
            `).join('');
            container.querySelectorAll('input').forEach(input => {
                input.addEventListener('change', () => {
                    currentScaleType = input.value;
                    buildScaleTypeOptions();
                    buildScaleOptions();
                    document.getElementById('scaleListTitle').innerText =
                        currentScaleType === 'Major Scale' ? 'Modes to include' : 'Positions to include';
                });
            });
        }

        // Build the shape selection checkboxes (preserving checked state)
        function buildScaleOptions() {
            const container = document.getElementById('scaleOptions');
            const checked = new Set(
                Array.from(container.querySelectorAll('input:checked')).map(i => i.value)
            );
            const firstBuild = container.innerHTML === '';
            container.innerHTML = modeData.map(mode => `
                <label class="scale-option">
                    <input type="checkbox" value="${mode.name}"${firstBuild || checked.has(mode.name) ? ' checked' : ''}>
                    <span>${labelFor(mode)}</span>
                </label>
            `).join('');
        }

        function getSelectedScales() {
            const checkedNames = new Set(
                Array.from(document.querySelectorAll('#scaleOptions input:checked')).map(i => i.value)
            );
            return modeData.filter(mode => checkedNames.has(mode.name));
        }

        let modes = [...modeData];
        let currentKey = '';
        let queue = [];
        let currentIndex = 0;
        let currentRound = 1;

        // Fisher-Yates Shuffle
        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Get all unique combinations of 2 strings
        function getPairs(arr) {
            let pairs = [];
            for(let i = 0; i < arr.length; i++) {
                for(let j = i + 1; j < arr.length; j++) {
                    pairs.push([arr[i], arr[j]]);
                }
            }
            return pairs;
        }

        function startNewKey() {
            const selected = getSelectedScales();
            if (selected.length === 0) {
                alert('Please select at least one scale to practice.');
                return;
            }
            modes = selected;

            document.getElementById('start-area').style.display = 'none';
            document.getElementById('app-area').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';

            currentKey = notes[Math.floor(Math.random() * notes.length)];
            document.getElementById('keyDisplay').innerText = `Key of ${currentKey} — ${currentScaleType}`;
            
            generateRound1();
            updateUI();
        }

        function generateRound1() {
            currentRound = 1;
            let exercises = modes.map(mode => ({
                mode,
                text: labelFor(mode)
            }));
            queue = shuffle(exercises);
            currentIndex = 0;
        }

        function generateRound2() {
            currentRound = 2;
            let exercises = [];
            modes.forEach(mode => {
                strings.forEach(string => {
                    exercises.push({
                        mode,
                        text: `${labelFor(mode)}<br><span class="shift-text">Shift on String ${string}</span>`
                    });
                });
            });
            queue = shuffle(exercises);
            currentIndex = 0;
        }

        function generateRound3() {
            currentRound = 3;
            let exercises = [];
            let pairs = getPairs(strings);
            modes.forEach(mode => {
                pairs.forEach(pair => {
                    exercises.push({
                        mode,
                        text: `${labelFor(mode)}<br><span class="shift-text">Shift on Strings ${pair[0]} & ${pair[1]}</span>`
                    });
                });
            });
            queue = shuffle(exercises);
            currentIndex = 0;
        }

        function nextExercise() {
            currentIndex++;
            if (currentIndex >= queue.length) {
                if (currentRound === 1) {
                    generateRound2();
                } else if (currentRound === 2) {
                    generateRound3();
                } else {
                    document.getElementById('exerciseDisplay').innerHTML = "All rounds complete! 🎉<br><span style='font-size: 1rem; color: #a1a1aa;'>You survived 110 variations!</span>";
                    document.getElementById('nextBtn').style.display = 'none';
                    document.getElementById('progressDisplay').innerText = "Session Done";
                    return;
                }
            }
            updateUI();
        }

        function updateUI() {
            const roundNames = [
                "Round 1: 1 Position", 
                "Round 2: 2 Octaves (1 Shift)", 
                "Round 3: 3 Positions (2 Shifts)"
            ];
            
            document.getElementById('roundDisplay').innerText = roundNames[currentRound - 1];
            document.getElementById('exerciseDisplay').innerHTML = queue[currentIndex].text;
            document.getElementById('progressDisplay').innerText = `Exercise ${currentIndex + 1} of ${queue.length}`;
        }

        // Spacebar advances to the next card while practicing
        document.addEventListener('keydown', (e) => {
            if (e.code !== 'Space' && e.key !== ' ') return;
            const appVisible = document.getElementById('app-area').style.display === 'block';
            const nextVisible = document.getElementById('nextBtn').style.display !== 'none';
            if (appVisible && nextVisible) {
                e.preventDefault();
                nextExercise();
            }
        });

        // Populate scale selection on load
        buildScaleTypeOptions();
        buildScaleOptions();
    </script>
</body>
</html>
