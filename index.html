<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alex-monroe — static pages</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        main { width: 100%; max-width: 640px; }
        h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
        p.sub { color: #9a9a9a; margin: 0 0 2rem; }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
            border-radius: 10px;
            margin-bottom: 0.75rem;
        }
        a {
            display: block;
            padding: 1rem 1.25rem;
            color: #ffffff;
            text-decoration: none;
        }
        a:hover { background: #262626; }
        .title { font-weight: 600; }
        .desc { color: #9a9a9a; font-size: 0.9rem; margin-top: 0.2rem; }
    </style>
</head>
<body>
    <main>
        <h1>Static pages</h1>
        <p class="sub">A grab-bag of single-page tools and docs.</p>
        <ul>
            <li>
                <a href="scale-flash-cards.html">
                    <span class="title">Guitar Mode Tracker</span>
                    <span class="desc">Scale / mode flash cards</span>
                </a>
            </li>
        </ul>
    </main>
</body>
</html>
